<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Example Restaurant | Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="logo" href="index.html">Example Restaurant</a>

      <button class="menu-toggle" aria-label="Open navigation menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="reviews.html">Reviews</a></li>
        <li><a class="active" href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="page-transition">
    <section class="section contact">
      <div class="section-text">
        <p class="eyebrow">Visit us</p>
        <h1>Reserve a table or ask about private events.</h1>
        <p>123 Market Street, Downtown<br>Open daily from 12:00 PM to 11:00 PM</p>
      </div>

      <form class="contact-form">
        <label>
          Name
          <input type="text" name="name" placeholder="Your name">
        </label>
        <label>
          Email
          <input type="email" name="email" placeholder="you@example.com">
        </label>
        <label>
          Message
          <textarea name="message" rows="4" placeholder="Tell us what you need"></textarea>
        </label>
        <button class="button primary-button" type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Example Restaurant. Template website for learning and customization.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
